# path or URL to sample sheet (TSV format, columns: sample, condition, ...)
samples: config/samples.tsv
# path or URL to sequencing unit sheet (TSV format, columns: sample, unit, fq1, fq2)
# Units are technical replicates (e.g. lanes, or resequencing of the same biological
# sample).
units: config/units.tsv

# optional inclusion of certain rules -------------------------------------------------------
mergeReads:
  activate: False

# text file containing list of chromosomes to keep when filtering ---------------------------
filter_chroms: True
keep_chroms: config/keep_chroms.txt

# reference genome options ------------------------------------------------------------------
ref_genome:
  name: hg38
  link: https://hgdownload.soe.ucsc.edu/goldenPath/hg38/bigZips/hg38.fa.gz

# spike-in genome options ------------------------------------------------------------------
use_spikeIn: True
epiCypher_spikeIn: True
epiCypher_barcodes: config/epicypher_HA_panel_nuc_barcodes.csv

spikeIn_genome:
  name: Escherichia_coli_K_12_MG1655
  link: https://s3.amazonaws.com/igenomes.illumina.com/Escherichia_coli_K_12_MG1655/NCBI/2001-10-15/Escherichia_coli_K_12_MG1655_NCBI_2001-10-15.tar.gz




# changes to rule paramters ---------------------------------------------------------------
params:
  bowtie2_index: ""
  bowtie2_align: "-k 2 --very-sensitive --no-mixed --no-discordant -X 5000"
  filter_multireads: "-f bam -F '(mapping_quality >= 30) and ([XS] == null)'" 
  bigwigs_ind: "--binSize 10"
  bigwigs_merged: "--binSize 10"
  macs2_call_peaks_narrow: "-f BAMPE --keep-dup all -g hs --call-summits"
  macs2_call_peaks_broad: "-f BAMPE --keep-dup all -g hs"
  bigwigs_ind: "--binSize 10"
  bigwigs_merged: "--binSize 10"
  filter_peaks_by_replicates:
    min_overlap: 10
    replicate_threshold: 1
